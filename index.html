<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<style>
  :root{
    --bg:#1B1D21; --panel:#24272C; --panel-raised:#2B2F35; --ink:#ECEEF0; --ink-dim:#8B9198;
    --line:#35393F; --accent:#FF7A3D; --accent-ink:#1B1D21; --good:#4FBE7C; --radius:12px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; background:transparent; color:var(--ink); font-family:'Inter',sans-serif; }
  #app{ background:var(--bg); border-radius:14px; padding:20px; }
  .mono{ font-family:'IBM Plex Mono',monospace; }
  h1{ font-family:'Space Grotesk',sans-serif; font-size:19px; margin:0 0 2px; }
  .sub{ color:var(--ink-dim); font-size:12.5px; margin:0 0 16px; }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:14px; }
  #cameraWrap{ position:relative; border-radius:10px; overflow:hidden; background:#000; aspect-ratio:4/3; margin-bottom:10px; }
  #scanVideo{ width:100%; height:100%; object-fit:cover; display:block; }
  .scan-frame{ position:absolute; inset:16%; border:2px solid rgba(255,122,61,.85); border-radius:8px; pointer-events:none; }
  #cameraStatus{ font-size:12.5px; color:var(--ink-dim); margin:6px 2px 14px; }
  .manual-row{ display:flex; gap:8px; }
  .manual-row input{ flex:1; background:var(--panel-raised); border:1px solid var(--line); color:var(--ink);
    border-radius:8px; padding:11px 12px; font-family:'IBM Plex Mono',monospace; font-size:14px; text-transform:uppercase; }
  .btn{ appearance:none; border:none; border-radius:8px; padding:11px 16px; font-weight:600; font-size:13.5px; cursor:pointer; font-family:'Inter',sans-serif; }
  .btn-accent{ background:var(--accent); color:var(--accent-ink); }
  .btn-ghost{ background:var(--panel-raised); color:var(--ink); border:1px solid var(--line); }
  #result{ margin-top:14px; min-height:1px; }
  .result-card{ background:var(--panel-raised); border:1px solid var(--line); border-radius:var(--radius); padding:18px; text-align:center; }
  .result-kicker{ font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-dim); }
  .result-name{ font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:700; margin:6px 0 10px; }
  .result-meta{ display:flex; justify-content:center; gap:18px; font-size:13px; color:var(--ink-dim); }
  .result-meta b{ color:var(--ink); font-family:'IBM Plex Mono',monospace; }
  .not-found{ color:var(--ink-dim); font-size:13.5px; }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th{ text-align:left; color:var(--ink-dim); font-size:11px; text-transform:uppercase; letter-spacing:.05em; padding:6px 4px; border-bottom:1px solid var(--line); }
  td{ padding:8px 4px; border-bottom:1px solid var(--line); }
  td.code{ font-family:'IBM Plex Mono',monospace; color:var(--ink-dim); white-space:nowrap; }
  .price{ color:var(--ink-dim); }
</style>

<div id="app">
  <h1>3D by SS — Barcode Lookup</h1>
  <p class="sub">Scan a label (SS-001–SS-027) to see the product name instead of the code.</p>

  <div class="card">
    <div id="cameraWrap">
      <video id="scanVideo" playsinline muted></video>
      <div class="scan-frame"></div>
    </div>
    <div id="cameraStatus">Starting camera…</div>
    <form id="manualForm" class="manual-row">
      <input id="manualCode" placeholder="Or type the code, e.g. SS-001" autocomplete="off" autocapitalize="characters">
      <button class="btn btn-accent" type="submit">Look up</button>
    </form>
    <div id="result"></div>
  </div>

  <div class="card">
    <h1 style="font-size:14px;margin-bottom:10px;">Full code reference</h1>
    <table id="refTable"></table>
  </div>
</div>

<script>
(function(){
  "use strict";

  const CATALOG = [
    ["SS-001","Espresso Capsule Holder",10],
    ["SS-002","Funny Door Stopper",3],
    ["SS-003","Cat Decor",7],
    ["SS-004","Infinity Cube Fidget",4],
    ["SS-005","Wiggling Noodle Fidget",4],
    ["SS-006","The Flying Plane",2],
    ["SS-007","Desk Cable Holder",5],
    ["SS-008","Twisting Fidget",3],
    ["SS-009","Hexagon Fidget",3],
    ["SS-010","Dino Keychains",2],
    ["SS-011","Custom Name Keychains",3],
    ["SS-012","Spider Web Fidget",3],
    ["SS-013","MagSafe Charger",5],
    ["SS-014","Flower Bookmark",3],
    ["SS-015","Car Logo Keychains",2],
    ["SS-016","3 in 1 Fidget",4],
    ["SS-017","Tic Tac Toe",3],
    ["SS-018","Custom Name Keychains (Kids)",3],
    ["SS-019","Kitchen Utensil Holder",4],
    ["SS-020","Thinking Statue",3],
    ["SS-021","Decorative Owl Figurines",15],
    ["SS-022","Face Sculpture",5],
    ["SS-023","Clicker Fidget",3],
    ["SS-024","Ramadan Calendar",5],
    ["SS-025","Palestine Keychain",3],
    ["SS-026","Leaf Costers",6],
    ["SS-027","Jordan Nashama Keychain",2]
  ];
  const LOOKUP = {};
  CATALOG.forEach(([code,name,price]) => LOOKUP[code] = {name, price});

  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // normalize scanned text to the SS-### shape even if a scanner drops the dash or pads digits differently
  function normalizeCode(raw){
    let s = (raw||'').trim().toUpperCase();
    const m = s.match(/SS-?\s*(\d{1,3})/);
    if(m){ return 'SS-' + m[1].padStart(3,'0'); }
    return s;
  }

  function renderReference(){
    const t = document.getElementById('refTable');
    t.innerHTML = '<tr><th>Code</th><th>Product</th><th>Price</th></tr>' +
      CATALOG.map(([code,name,price]) =>
        '<tr><td class="code">'+code+'</td><td>'+escapeHtml(name)+'</td><td class="price">'+price+' JD</td></tr>'
      ).join('');
  }
  renderReference();

  let lastCode = '', lastTime = 0;
  function handleScan(raw){
    const code = normalizeCode(raw);
    if(!code) return;
    const now = Date.now();
    if(code === lastCode && now - lastTime < 1200) return;
    lastCode = code; lastTime = now;
    const item = LOOKUP[code];
    const box = document.getElementById('result');
    if(item){
      box.innerHTML =
        '<div class="result-card">'+
          '<div class="result-kicker">Scanned '+code+'</div>'+
          '<div class="result-name">'+escapeHtml(item.name)+'</div>'+
          '<div class="result-meta"><span>Price <b>'+item.price+' JD</b></span></div>'+
        '</div>';
    } else {
      box.innerHTML =
        '<div class="result-card">'+
          '<div class="result-kicker">Scanned</div>'+
          '<div class="result-name mono">'+escapeHtml(raw)+'</div>'+
          '<div class="not-found">No product matches this code. Check the reference list below.</div>'+
        '</div>';
    }
  }

  document.getElementById('manualForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const input = document.getElementById('manualCode');
    handleScan(input.value);
    input.value = '';
    input.focus();
  });

  let stream = null, scanTimer = null, zxingReader = null;

  async function startCamera(){
    const statusEl = document.getElementById('cameraStatus');
    const wrap = document.getElementById('cameraWrap');
    const video = document.getElementById('scanVideo');

    if('BarcodeDetector' in window){
      // Fast native path (Chrome / Android / desktop Chrome, Edge)
      try{
        const detector = new BarcodeDetector();
        stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
        video.srcObject = stream;
        await video.play();
        statusEl.textContent = 'Point the camera at a label.';
        scanTimer = setInterval(async () => {
          try{
            const codes = await detector.detect(video);
            if(codes && codes.length){ handleScan(codes[0].rawValue); }
          }catch(e){ /* ignore per-frame decode errors */ }
        }, 350);
      }catch(e){
        statusEl.textContent = "Couldn't access the camera here (" + (e && e.message ? e.message : 'permission denied') + "). Use the input below instead.";
        wrap.style.display = 'none';
      }
      return;
    }

    // Safari / iOS / Firefox fallback: BarcodeDetector isn't implemented there,
    // so decode frames in pure JS with ZXing instead.
    if(typeof ZXing === 'undefined'){
      statusEl.textContent = "The scanner library didn't load (check your connection and reload). Use the input below instead.";
      wrap.style.display = 'none';
      return;
    }
    try{
      zxingReader = new ZXing.BrowserMultiFormatReader();
      statusEl.textContent = 'Point the camera at a label.';
      // deviceId=undefined makes it prefer the rear (environment-facing) camera automatically
      zxingReader.decodeFromVideoDevice(undefined, video, (result, err) => {
        if(result){
          const text = typeof result.getText === 'function' ? result.getText() : result.text;
          handleScan(text);
        }
        // err fires on every frame with no barcode found — that's normal, ignore it
      });
    }catch(e){
      statusEl.textContent = "Couldn't access the camera here (" + (e && e.message ? e.message : 'permission denied') + "). Use the input below instead.";
      wrap.style.display = 'none';
    }
  }
  startCamera();
})();
</script>
